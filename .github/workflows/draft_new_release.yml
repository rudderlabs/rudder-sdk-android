name: Draft new release

on:
  workflow_dispatch

permissions:
  contents: read

jobs:
  draft-new-release:
    permissions:
      contents: read # to read repository contents
    name: Draft a new release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/develop') || startsWith(github.ref, 'refs/heads/hotfix/') || startsWith(github.ref, 'refs/heads/develop-mpx') || startsWith(github.ref, 'refs/heads/hotfix-mpx')
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@67018539274d69449ef7c02e8e71183d1719ab42 # v2.1.4
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}
          permission-contents: write # to create commits, tags, and releases
          permission-pull-requests: write # to create and update PRs
          permission-members: read # to resolve team reviewers

      - name: Checkout source branch
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Set Node 16
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 16

      # Calculate the next release version based on conventional semantic release
      - name: Calculate release version
        id: create-release
        run: |
          source_branch_name=${GITHUB_REF##*/}
          release_type=release
          main_branch=master
          branch_type=''
          grep -q "hotfix/" <<< "${GITHUB_REF}" && release_type=hotfix-release
          grep -q "mpx" <<< "${GITHUB_REF}" && branch_type=-mpx && main_branch=master-mpx

          git fetch --tags origin
          current_version=$(cat gradle.properties | grep "VERSION_NAME" | cut -d'=' -f2)

          npm ci
          npx standard-version --skip.commit --skip.tag --skip.changelog
          new_version=$(cat gradle.properties | grep "VERSION_NAME" | cut -d'=' -f2)
          git reset --hard

          branch_name="${release_type}${branch_type}/${new_version}"

          echo "Source branch for new release is $source_branch_name"
          echo "Current version is $current_version"
          echo "Release type is $release_type"
          echo "New version is $new_version"
          echo "New release branch name is $branch_name"

          echo "source_branch_name=$source_branch_name" >> $GITHUB_OUTPUT
          echo "branch_name=$branch_name" >> $GITHUB_OUTPUT
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "main_branch=$main_branch" >> $GITHUB_OUTPUT

      - name: Create release branch via GitHub API
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          BASE_SHA=$(git rev-parse HEAD)
          gh api repos/${{ github.repository }}/git/refs \
            --method POST \
            -f ref="refs/heads/${{ steps.create-release.outputs.branch_name }}" \
            -f sha="$BASE_SHA"

      - name: Merge main into release branch via API
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh api repos/${{ github.repository }}/merges \
            --method POST \
            -f base="${{ steps.create-release.outputs.branch_name }}" \
            -f head="${{ steps.create-release.outputs.main_branch }}" \
            -f commit_message="Merge ${{ steps.create-release.outputs.main_branch }} into ${{ steps.create-release.outputs.branch_name }}"

      - name: Checkout release branch
        run: |
          git fetch origin "${{ steps.create-release.outputs.branch_name }}"
          git checkout "${{ steps.create-release.outputs.branch_name }}"

      - name: Update changelog & bump version (skip commit)
        id: finish-release
        run: |
          npm ci
          npx standard-version --skip.commit --skip.tag

      - name: Create verified commit and tag via API
        uses: ryancyq/github-signed-commit@e9f3b28c80da7be66d24b8f501a5abe82a6b855f # v1.2.0
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        with:
          branch-name: ${{ steps.create-release.outputs.branch_name }}
          commit-message: 'chore(release): v${{ steps.create-release.outputs.new_version }}'
          files: |
            CHANGELOG.md
            gradle.properties
            package.json
          tag: 'v${{ steps.create-release.outputs.new_version }}'

      - name: Create pull request into main
        uses: repo-sync/pull-request@7e79a9f5dc3ad0ce53138f01df2fad14a04831c5 # v2
        with:
          source_branch: ${{ steps.create-release.outputs.branch_name }}
          destination_branch: ${{ steps.create-release.outputs.main_branch }}
          github_token: ${{ steps.generate-token.outputs.token }}
          pr_title: "chore(release): pulling ${{ steps.create-release.outputs.branch_name }} into ${{ steps.create-release.outputs.main_branch }}"
          pr_body:  ":crown: *An automated PR*"
          pr_reviewer: '@rudderlabs/sdk-android'
