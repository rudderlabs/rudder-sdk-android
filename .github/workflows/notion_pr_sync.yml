name: Notion PR Sync

on:
  issues:
    types:
      [
        opened,
        edited,
        deleted,
        transferred,
        pinned,
        unpinned,
        closed,
        reopened,
        assigned,
        unassigned,
        labeled,
        unlabeled,
        locked,
        unlocked,
        milestoned,
        demilestoned,
      ]
  pull_request:
    types:
      [
        assigned,
        unassigned,
        labeled,
        unlabeled,
        opened,
        edited,
        closed,
        reopened,
        synchronize,
        converted_to_draft,
        ready_for_review,
        locked,
        unlocked,
        review_requested,
        review_request_removed,
        auto_merge_enabled,
        auto_merge_disabled,
      ]

permissions:
  contents: read

jobs:
  request:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read # to read PR metadata for Notion sync
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Sync Github PRs to Notion
        uses: sivashanmukh/github-notion-pr-sync@3967330238449a8550b06f6e1d6b83e1af569876 # 1.0.0
        with:
          notionKey: ${{ secrets.NOTION_BOT_KEY }}
          notionDatabaseId: ${{ secrets.NOTION_PR_DB_ID }}
          githubKey: ${{ secrets.GITHUB_TOKEN }}
