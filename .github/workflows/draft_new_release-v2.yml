name: Draft new release for v2

on:
  workflow_dispatch:
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: read

jobs:
  draft-new-release-v2:
    permissions:
      contents: read # to read repository contents
    name: Draft a new release for v2
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/develop-v2') || startsWith(github.ref, 'refs/heads/hotfix-v2/')
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@67018539274d69449ef7c02e8e71183d1719ab42 # v2.1.4
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}
          permission-contents: write # to create commits, tags, and releases
          permission-pull-requests: write # to create and update PRs

      - name: Checkout source branch
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install node_modules
        run: |
          npm ci

      # Calculate the next release version based on conventional semantic release
      - name: Calculate release version
        id: create-release
        run: |
          source_branch_name=${GITHUB_REF##*/}
          release_type=release-v2
          grep -q "hotfix-v2/" <<< "${GITHUB_REF}" && release_type=hotfix-release-v2
          git fetch origin master-v2 --depth=1
          git merge origin/master-v2
          current_version=$(jq -r .version package.json)

          npm run bump-version:monorepo
          new_version=$(jq -r .version package.json)
          git reset --hard

          branch_name="${release_type}/${new_version}"

          echo "Source branch for new release is $source_branch_name"
          echo "Current version is $current_version"
          echo "Release type is $release_type"
          echo "New version is $new_version"
          echo "New release branch name is $branch_name"

          echo "source_branch_name=$source_branch_name" >> $GITHUB_OUTPUT
          echo "branch_name=$branch_name" >> $GITHUB_OUTPUT
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "CURRENT_VERSION_VALUE=$current_version" >> $GITHUB_ENV
          echo "NEW_VERSION_VALUE=$new_version" >> $GITHUB_ENV

      - name: Create release branch via GitHub API
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          BASE_SHA=$(git rev-parse origin/master-v2)
          gh api repos/${{ github.repository }}/git/refs \
            --method POST \
            -f ref="refs/heads/${{ steps.create-release.outputs.branch_name }}" \
            -f sha="$BASE_SHA"

      - name: Update changelog & bump version (skip commit)
        id: finish-release
        # We need main history that contains all previous tags commit reference
        run: |
          echo "Current version: $CURRENT_VERSION_VALUE"
          echo "New version: $NEW_VERSION_VALUE"
          git fetch --no-tags --prune --depth=100 origin master-v2
          npm run release
          ./scripts/sync-tags-in-nx-projects.sh
          ./scripts/generate-last-release-changelog.sh
          npm run bump-version:monorepo

      - name: Create verified commit and tag via API
        uses: ryancyq/github-signed-commit@e9f3b28c80da7be66d24b8f501a5abe82a6b855f # v1.2.0
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        with:
          branch-name: ${{ steps.create-release.outputs.branch_name }}
          commit-message: 'chore: sync versions and generate release logs'
          files: |
            CHANGELOG.md
            packages/*/CHANGELOG.md
            package.json
            packages/*/package.json
            package-lock.json
          tag: 'v${{ steps.create-release.outputs.new_version }}'

      - name: Create pull request into master-v2
        uses: repo-sync/pull-request@7e79a9f5dc3ad0ce53138f01df2fad14a04831c5 # v2.12.1
        with:
          source_branch: ${{ steps.create-release.outputs.branch_name }}
          destination_branch: 'master-v2'
          github_token: ${{ steps.generate-token.outputs.token }}
          pr_title: 'chore(release): pulling ${{ steps.create-release.outputs.branch_name }} into master-v2'
          pr_body: ':crown: *An automated PR*'
          pr_reviewer: '@rudderlabs/sdk-android'